<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEIPLAMIN - Repositorio Minero</title>

<style>
:root {
    --primary: #ff7a00;
    --primary-dark: #e56700;
    --dark: #1a1a1a;
    --light-bg: #fdf6ec;
    --white: #ffffff;
}

body {
    margin: 0;
    font-family: Arial;
    background: var(--light-bg);
    color: var(--dark);
}

header {
    background: #000;
    padding: 50px;
    text-align: center;
    color: white;
}

nav {
    background: #111;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

section {
    padding: 60px 20px;
    text-align: center;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    margin: 10px;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
}

button {
    background: var(--primary);
    border: none;
    padding: 10px;
    color: white;
    cursor: pointer;
}

footer {
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
<h1>GEIPLAMIN</h1>
<p>Grupo de Planeamiento Minero UNMSM</p>
</header>

<nav>
<a href="#inicio">Inicio</a>
<a href="#recursos">Material</a>
<a href="#software">Software</a>
<a href="#eventos">Eventos</a>
</nav>

<section id="inicio">
<h2>Bienvenidos</h2>

<div class="grid">
<div class="card">
<h3>📚 Bibliografía</h3>
<button onclick="document.getElementById('recursos').scrollIntoView()">Ver</button>
</div>

<div class="card">
<h3>💻 Software</h3>
<button onclick="document.getElementById('software').scrollIntoView()">Ver</button>
</div>

<div class="card">
<h3>🎥 Eventos</h3>
<button onclick="document.getElementById('eventos').scrollIntoView()">Ver</button>
</div>
</div>

</section>

<section id="recursos">
<h2>Material</h2>
<button onclick="window.open('https://drive.google.com')">Abrir Drive</button>
</section>

<section id="software">
<h2>Software</h2>
<div class="grid">
<div class="card">Datamine</div>
<div class="card">Deswik</div>
<div class="card">MineSight</div>
</div>
</section>

<section id="eventos">
<h2>Eventos 2026</h2>
<p>Próximamente...</p>
</section>

<footer>
<p>© 2026 GEIPLAMIN</p>
</footer>

</body>
</html>
