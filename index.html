<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario GEIPLAMIN</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1a2a3a;
    color: white;
}

h1 {
    text-align: center;
    padding: 20px;
}

.calendar {
    max-width: 900px;
    margin: auto;
    background: #2c3e50;
    border-radius: 10px;
    overflow: hidden;
}

.calendar-header {
    text-align: center;
    padding: 15px;
    font-size: 28px;
    background: #34495e;
}

.days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #ff7a00;
}

.days div {
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
}

.day {
    min-height: 100px;
    border: 1px solid #555;
    padding: 5px;
    background: #ecf0f1;
    color: black;
}

.weekend {
    background: #f5cba7;
}

.event {
    background: #d35400;
    color: white;
    padding: 3px;
    margin-top: 5px;
    border-radius: 5px;
    font-size: 12px;
}
</style>
</head>

<body>

<h1>📅 Abril 2026</h1>

<div class="calendar">

<div class="calendar-header">Abril 2026</div>

<div class="days">
<div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
</div>

<div class="grid">

<div class="day"></div>
<div class="day"></div>

<div class="day">1</div>
<div class="day">2</div>
<div class="day">3</div>

<div class="day weekend">5</div>

<div class="day weekend">6</div>

<div class="day">8</div>

<div class="day">
9
<div class="event">Intro Planeamiento</div>
</div>

<div class="day">10</div>
<div class="day weekend">11</div>
<div class="day weekend">12</div>

<div class="day">13</div>
<div class="day">14</div>

<div class="day">
15
<div class="event">Conf. Deswik</div>
</div>

<div class="day">16</div>
<div class="day">17</div>

</div>
</div>

</body>
</html>
