<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEIPLAMIN - Repositorio Minero</title>

<style>
/* VARIABLES DE COLOR GEIPLAMIN */
:root {
    --naranja: #ff7a00;
    --naranja-oscuro: #e66e00;
    --negro: #1a1a1a;
    --gris-fondo: #f4f4f4;
    --blanco: #ffffff;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #fdf6ec;
    color: var(--negro);
    line-height: 1.6;
}

/* ENCABEZADO */
header {
    background: linear-gradient(135deg, var(--negro), #333);
    padding: 60px 20px;
    text-align: center;
    color: white;
    border-bottom: 5px solid var(--naranja);
}

header h1 { margin: 0; font-size: 3rem; letter-spacing: 2px; }
header p { opacity: 0.8; font-size: 1.2rem; }

/* NAVEGACIÓN */
nav {
    background: rgba(0, 0, 0, 0.95);
    padding: 15px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover { color: var(--naranja); }

/* SECCIONES GENERALES */
section {
    padding: 80px 20px;
    max-width: 1100px;
    margin: auto;
    text-align: center;
}

section:nth-child(even) { background: var(--blanco); }

.card {
    background: white;
    padding: 25px;
    margin: 15px;
    border-radius: 15px;
    display: inline-block;
    width: 280px;
    vertical-align: top;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    border-top: 4px solid var(--naranja);
}

button {
    background: var(--naranja);
    border: none;
    padding: 12px 25px;
    color: white;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover { background: var(--naranja-oscuro); transform: scale(1.05); }
