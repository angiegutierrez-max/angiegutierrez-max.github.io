<section id="eventos">
<h2>Calendario 2026</h2>
<p>Agenda de actividades GEIPLAMIN</p>

<div id="calendarios"></div> <!-- Aquí se generarán los calendarios automáticamente -->

</section>

<script>
// Generar todos los meses 2026
const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const diasSemana = ["L","M","X","J","V","S","D"];
const contenedor = document.getElementById("calendarios");

for(let m=0; m<12; m++){
    const date = new Date(2026, m, 1);
    const firstDay = (date.getDay() + 6) % 7; // lunes=0
    const lastDay = new Date(2026, m+1, 0).getDate();

    const cal = document.createElement("div");
    cal.className = "calendar";

    const header = document.createElement("div");
    header.className = "calendar-header";
    header.textContent = `${meses[m]} 2026`;
    cal.appendChild(header);

    const daysRow = document.createElement("div");
    daysRow.className = "days";
    diasSemana.forEach(d => {
        const div = document.createElement("div");
        div.textContent = d;
        daysRow.appendChild(div);
    });
    cal.appendChild(daysRow);

    const grid = document.createElement("div");
    grid.className = "grid";

    // Espacios vacíos antes del primer día
    for(let i=0;i<firstDay;i++){
        const empty = document.createElement("div");
        empty.className = "day";
        grid.appendChild(empty);
    }

    // Días del mes
    for(let d=1; d<=lastDay; d++){
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";

        const dayOfWeek = (firstDay + d - 1) % 7;
        if(dayOfWeek === 5 || dayOfWeek === 6) dayDiv.classList.add("weekend");

        dayDiv.textContent = d;

        // Aquí puedes agregar eventos de GEIPLAMIN, ejemplo:
        // if(d===9 && m===3){ // Abril 9
        //   const ev = document.createElement("div");
        //   ev.className="event";
        //   ev.textContent="Intro Planeamiento";
        //   dayDiv.appendChild(ev);
        // }

        grid.appendChild(dayDiv);
    }

    cal.appendChild(grid);
    contenedor.appendChild(cal);
}
</script>
