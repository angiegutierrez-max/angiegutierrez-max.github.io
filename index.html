<style>
/* Variables para cambiar colores rápido */
:root {
    --naranja: #ff7a00;
    --naranja-claro: #ff9a3c;
    --negro: #1a1a1a;
    --fondo: #fdf6ec;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--fondo);
    color: var(--negro);
    line-height: 1.6;
}

header {
    background: linear-gradient(135deg, var(--negro), #333); /* Un toque más sobrio */
    padding: 50px 20px;
    text-align: center;
    color: white;
    border-bottom: 5px solid var(--naranja);
}

header h1 {
    margin: 0;
    font-size: 3rem;
    letter-spacing: 2px;
}

nav {
    background: rgba(0, 0, 0, 0.9);
    padding: 15px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(5px); /* Efecto borroso moderno */
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
}

nav a:hover {
    color: var(--naranja);
}

section {
    padding: 80px 20px;
    max-width: 1000px;
    margin: auto;
    text-align: center;
}

/* Alternar color de fondo en secciones para mejor lectura */
section:nth-child(even) {
    background-color: #ffffff;
}

.card {
    background: white;
    padding: 30px;
    margin: 15px;
    border-radius: 15px;
    display: inline-block;
    width: 280px;
    vertical-align: top;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    transition: transform 0.3s, box-shadow 0.3s;
    border-top: 4px solid var(--naranja);
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

button {
    background: var(--naranja);
    border: none;
    padding: 12px 25px;
    color: white;
    border-radius: 25px; /* Botones más redondeados */
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
    margin-top: 15px;
}

button:hover {
    background: #e66e00;
}

footer {
    background: var(--negro);
    color: #888;
    padding: 40px;
    text-align: center;
}
</style>
